<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌌 知识宇宙 · 七大星系完整版</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0e1a; color: #e0e6f0; min-height: 100vh; overflow-x: hidden;
        }
        .stars { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; overflow:hidden; }
        .star { position:absolute; border-radius:50%; background:#fff; animation:twinkle var(--duration) ease-in-out infinite alternate; }
        @keyframes twinkle { 0%{opacity:0.2;transform:scale(0.8)} 100%{opacity:1;transform:scale(1.2)} }
        .container { position:relative; z-index:1; max-width:1300px; margin:0 auto; padding:20px; }

        .header { text-align:center; padding:40px 20px; }
        .header h1 {
            font-size:3rem; font-weight:800;
            background:linear-gradient(135deg,#f0e6ff,#a78bfa,#60a5fa,#34d399);
            background-size:300% 300%;
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
            animation:gradientShift 6s ease-in-out infinite; letter-spacing:4px;
        }
        @keyframes gradientShift { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }
        .header p { color:#8899bb; margin-top:10px; font-size:1.05rem; }

        .tabs { display:flex; flex-wrap:wrap; justify-content:center; gap:8px; margin:25px 0 20px; }
        .tab {
            padding:10px 18px; border-radius:50px; border:2px solid transparent;
            background:rgba(20,26,46,0.75); cursor:pointer; font-size:0.85rem; font-weight:600;
            color:#8899bb; transition:all .3s; user-select:none;
        }
        .tab:hover { transform:translateY(-2px); }
        .tab.active { color:#fff; transform:translateY(-2px); }
        .tab .badge { font-size:0.6rem; background:rgba(255,255,255,0.1); padding:2px 8px; border-radius:12px; margin-left:4px; }

        .content { min-height:300px; }
        .page { display:none; }
        .page.active { display:block; animation:fadeIn .35s ease; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

        .card {
            background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.06);
            border-radius:12px; padding:14px 18px; margin-bottom:8px;
        }
        .card-title {
            font-size:1.05rem; font-weight:700; cursor:pointer; user-select:none;
            display:flex; align-items:center; gap:8px;
        }
        .card-title .arrow { font-size:0.8rem; color:#667799; transition:transform .3s; width:16px; display:inline-block; text-align:center; }
        .card-title .arrow.open { transform:rotate(90deg); }
        .card-title .tag { font-size:0.6rem; padding:2px 10px; border-radius:12px; background:rgba(255,255,255,0.06); color:#8899bb; margin-left:auto; }
        .card-desc { color:#8899bb; font-size:0.88rem; margin-top:4px; padding-left:24px; line-height:1.5; }
        .card-children { padding-left:16px; margin-top:8px; border-left:2px solid rgba(255,255,255,0.05); }
        .card-children.hidden { display:none; }

        .sub-card {
            background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.03);
            border-radius:10px; padding:10px 14px; margin-bottom:5px;
        }
        .sub-card .sc-title { font-size:0.92rem; font-weight:600; cursor:pointer; user-select:none; display:flex; align-items:center; gap:6px; }
        .sub-card .sc-desc { color:#7788aa; font-size:0.82rem; margin-top:2px; padding-left:20px; }

        .leaf { padding:5px 10px 5px 18px; border-radius:6px; display:flex; align-items:flex-start; gap:5px; }
        .leaf .dot { color:#667799; font-size:0.75rem; margin-top:1px; flex-shrink:0; }
        .leaf .text { flex:1; }
        .leaf .label { font-weight:500; font-size:0.85rem; }
        .leaf .exp { color:#7788aa; font-size:0.78rem; line-height:1.4; }

        .bottom-map {
            margin-top:40px; padding:24px; border-radius:16px;
            background:rgba(20,26,46,0.5); border:1px solid rgba(255,255,255,0.05);
        }
        .bottom-map h3 { text-align:center; color:#aabbdd; margin-bottom:16px; font-size:1.2rem; }
        .map-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:8px; }
        .map-item {
            display:flex; align-items:center; gap:10px; padding:10px 14px; border-radius:10px;
            background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.03);
            cursor:pointer; transition:.2s;
        }
        .map-item:hover { background:rgba(255,255,255,0.05); transform:translateX(4px); }
        .map-item .mi-icon { font-size:1.3rem; }
        .map-item .mi-text { flex:1; }
        .map-item .mi-name { font-weight:600; font-size:0.85rem; }
        .map-item .mi-desc { color:#7788aa; font-size:0.72rem; }

        @media(max-width:768px){
            .header h1{font-size:2rem}
            .tab{padding:7px 12px;font-size:0.75rem}
            .tab .badge{display:none}
            .card{padding:12px 14px}
            .card-title{font-size:0.95rem}
            .sub-card{padding:8px 10px}
        }
    </style>
</head>

        <h1>🌌 知识宇宙</h1>

    </div>
</div>

let cur = 0;

function stars(){
    const c=document.getElementById('stars');
    for(let i=0;i<150;i++){
        const s=document.createElement('div');
        s.className='star';
        const sz=Math.random()*2.5+1;
        s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--duration:${Math.random()*3+2}s;animation-delay:${Math.random()*5}s`;
        c.appendChild(s);
    }
}
function renderTabs(){
    const c=document.getElementById('tabs');
    c.innerHTML='';
    GALAXIES.forEach((g,i)=>{
        const t=document.createElement('div');
        t.className=`tab${i===0?' active':''}`;
        t.style.cssText=i===0?`border-color:${g.color};background:${g.color}22;color:#fff`:``;
        t.innerHTML=`${g.icon} ${g.name}<span class="badge">${g.count}</span>`;
        t.onclick=()=>switchGal(i);
        c.appendChild(t);
    });
}
function switchGal(idx){
    cur=idx;
    document.querySelectorAll('.tab').forEach((t,i)=>{
        const g=GALAXIES[i];
        t.classList.toggle('active',i===idx);
        t.style.cssText=i===idx?`border-color:${g.color};background:${g.color}22;color:#fff`:'';
    });
    renderContent(idx);
}
function renderContent(idx){
    const area=document.getElementById('content');
    const g=GALAXIES[idx];
    let h=`<div class="page active"><h2 style="color:${g.color};margin-bottom:8px;font-size:1.5rem">${g.icon} ${g.name}</h2>`;
    h+=`<p style="color:#8899bb;margin-bottom:18px;line-height:1.6">${g.headerDesc}</p>`;
    h+=`<p style="color:#667799;font-size:0.82rem;margin-bottom:16px">📚 共 ${g.count} 个核心概念</p>`;
    g.items.forEach(item=>{h+=buildCard(item,0);});
    h+='</div>';
    area.innerHTML=h;
    area.querySelectorAll('.card-title, .sc-title').forEach(el=>{
        el.onclick=function(){
            const p=this.closest('[data-ch]');
            if(!p)return;
            const ch=p.querySelector(':scope>.card-children, :scope>.subs');
            const ar=this.querySelector('.arrow');
            if(ch){ch.classList.toggle('hidden');if(ar)ar.classList.toggle('open');}
        };
    });
}
function buildCard(item,level){
    const hasSubs = item.subs && item.subs.length>0;
    const hasLeafs = item.leafs && item.leafs.length>0;
    const hasCh = hasSubs || hasLeafs;
    let h='';
    if(level===0){
        h=`<div class="card" data-ch="${hasCh}">
            <div class="card-title">
                ${hasCh?'<span class="arrow open">▶</span>':'<span style="width:16px;display:inline-block"></span>'}
                <span>${item.title||''}</span>
                ${item.tag?`<span class="tag" style="border:1px solid ${GALAXIES[cur].color}33;color:${GALAXIES[cur].color}">${item.tag}</span>`:''}
            </div>
            ${item.desc?`<div class="card-desc">${item.desc}</div>`:''}`;
        if(hasSubs){
            h+='<div class="card-children">';
            item.subs.forEach(s=>{h+=buildCard(s,1);});
            h+='</div>';
        }else if(hasLeafs){
            h+='<div class="card-children">';
            item.leafs.forEach(l=>{
                h+=`<div class="leaf"><span class="dot">▸</span><div class="text"><div class="label">${l.l||l.label||''}</div>${l.e||l.explain?`<div class="exp">${l.e||l.explain}</div>`:''}</div></div>`;
            });
            h+='</div>';
        }
        h+='</div>';
    }else{
        const hasSubs2 = item.subs && item.subs.length>0;
        const hasLeafs2 = item.leafs && item.leafs.length>0;
        const hasCh2 = hasSubs2 || hasLeafs2;
        h=`<div class="sub-card" data-ch="${hasCh2}">
            <div class="sc-title">
                ${hasCh2?'<span class="arrow open">▶</span>':'<span style="width:14px;display:inline-block"></span>'}
                <span>${item.title||''}</span>
                ${item.tag?`<span style="font-size:0.55rem;padding:1px 8px;border-radius:8px;background:rgba(255,255,255,0.05);color:#8899bb;margin-left:auto">${item.tag}</span>`:''}
            </div>
            ${item.desc?`<div class="sc-desc">${item.desc}</div>`:''}
            ${hasLeafs2?`<div class="subs">${item.leafs.map(l=>`<div class="leaf"><span class="dot">▸</span><div class="text"><div class="label">${l.l||l.label||''}</div>${l.e||l.explain?`<div class="exp">${l.e||l.explain}</div>`:''}</div></div>`).join('')}</div>`:''}
            ${hasSubs2?`<div class="subs">${item.subs.map(s=>buildCard(s,2)).join('')}</div>`:''}
        </div>`;
    }
    return h;
}
function renderMap(){
    const grid=document.getElementById('mapGrid');
    grid.innerHTML='';
    GALAXIES.forEach((g,i)=>{
        const item=document.createElement('div');
        item.className='map-item';
        item.innerHTML=`<span class="mi-icon">${g.icon}</span><div class="mi-text"><div class="mi-name" style="color:${g.color}">${g.name}</div><div class="mi-desc">${g.desc}</div></div><span style="color:#445577">→</span>`;
        item.onclick=()=>{switchGal(i);document.querySelector('.tabs').scrollIntoView({behavior:'smooth'});};
        grid.appendChild(item);
    });
}
stars();renderTabs();renderContent(0);renderMap();
</script>

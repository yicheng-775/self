<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌌 知识宇宙 · 七大星系全景</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0a0e1a;
            color: #e0e6f0;
            min-height: 100vh;
            overflow-x: hidden;
        }
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #141a2e;
        }
        ::-webkit-scrollbar-thumb {
            background: #2d3a5e;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #4a5a82;
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .star {
            position: absolute;
            border-radius: 50%;
            background: #fff;
            animation: twinkle var(--duration) ease-in-out infinite alternate;
        }
        @keyframes twinkle {
            0% {
                opacity: 0.2;
                transform: scale(0.8);
            }
            100% {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        .shooting-star {
            position: fixed;
            width: 2px;
            height: 2px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 6px 2px rgba(255, 255, 255, 0.3);
            animation: shoot 4s linear infinite;
            pointer-events: none;
            z-index: 0;
            opacity: 0;
        }
        .shooting-star::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 80px;
            height: 1px;
            background: linear-gradient(to left, rgba(255, 255, 255, 0.6), transparent);
            transform: translateX(-100%);
        }
        @keyframes shoot {
            0% {
                transform: translate(0, 0) rotate(-35deg);
                opacity: 0;
            }
            5% {
                opacity: 1;
            }
            20% {
                opacity: 1;
            }
            25% {
                transform: translate(calc(-100vw - 100px), calc(100vh + 100px)) rotate(-35deg);
                opacity: 0;
            }
            100% {
                opacity: 0;
            }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1300px;
            margin: 0 auto;
            padding: 20px 20px 60px;
        }

        .header {
            text-align: center;
            padding: 50px 20px 40px;
            position: relative;
        }
        .header h1 {
            font-size: 3.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f0e6ff, #a78bfa, #60a5fa, #34d399);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 6s ease-in-out infinite;
            letter-spacing: 4px;
        }
        @keyframes gradientShift {
            0%,
            100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }
        .header .subtitle {
            font-size: 1.15rem;
            color: #8899bb;
            margin-top: 12px;
            letter-spacing: 2px;
            font-weight: 300;
        }
        .header .divider {
            width: 120px;
            height: 2px;
            margin: 20px auto 0;
            background: linear-gradient(90deg, transparent, #60a5fa, #a78bfa, transparent);
            border-radius: 2px;
        }

        .galaxy-tabs {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin: 35px 0 30px;
            position: relative;
            z-index: 2;
        }
        .galaxy-tab {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 22px;
            border-radius: 50px;
            border: 2px solid transparent;
            background: rgba(20, 26, 46, 0.75);
            backdrop-filter: blur(8px);
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.95rem;
            font-weight: 600;
            color: #8899bb;
            user-select: none;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
        }
        .galaxy-tab .icon {
            font-size: 1.3rem;
            line-height: 1;
        }
        .galaxy-tab:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.4);
        }
        .galaxy-tab.active {
            color: #fff;
            transform: translateY(-3px);
            box-shadow: 0 6px 30px rgba(0, 0, 0, 0.5);
        }
        .galaxy-tab .badge {
            font-size: 0.7rem;
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 10px;
            border-radius: 20px;
            color: #aabbdd;
            font-weight: 400;
        }
        .galaxy-tab.active .badge {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        .tab-0.active {
            border-color: #ff6b6b;
            background: rgba(255, 107, 107, 0.18);
            box-shadow: 0 6px 30px rgba(255, 107, 107, 0.2);
        }
        .tab-1.active {
            border-color: #4ecdc4;
            background: rgba(78, 205, 196, 0.18);
            box-shadow: 0 6px 30px rgba(78, 205, 196, 0.2);
        }
        .tab-2.active {
            border-color: #45b7d1;
            background: rgba(69, 183, 209, 0.18);
            box-shadow: 0 6px 30px rgba(69, 183, 209, 0.2);
        }
        .tab-3.active {
            border-color: #96ceb4;
            background: rgba(150, 206, 180, 0.18);
            box-shadow: 0 6px 30px rgba(150, 206, 180, 0.2);
        }
        .tab-4.active {
            border-color: #ffeaa7;
            background: rgba(255, 234, 167, 0.18);
            box-shadow: 0 6px 30px rgba(255, 234, 167, 0.2);
        }
        .tab-5.active {
            border-color: #dda0dd;
            background: rgba(221, 160, 221, 0.18);
            box-shadow: 0 6px 30px rgba(221, 160, 221, 0.2);
        }
        .tab-6.active {
            border-color: #f0b27a;
            background: rgba(240, 178, 122, 0.18);
            box-shadow: 0 6px 30px rgba(240, 178, 122, 0.2);
        }

        .content-area {
            position: relative;
            min-height: 400px;
            margin-top: 10px;
        }

        .galaxy-content {
            display: none;
            animation: fadeSlideIn 0.5s ease;
        }
        .galaxy-content.active {
            display: block;
        }

        @keyframes fadeSlideIn {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .galaxy-header {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 25px 30px;
            border-radius: 16px;
            margin-bottom: 30px;
            background: rgba(20, 26, 46, 0.6);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
        }
        .galaxy-header .big-icon {
            font-size: 2.8rem;
            line-height: 1;
            flex-shrink: 0;
        }
        .galaxy-header .info h2 {
            font-size: 1.8rem;
            font-weight: 700;
        }
        .galaxy-header .info .desc {
            color: #99aacd;
            margin-top: 6px;
            font-size: 1rem;
            line-height: 1.5;
        }
        .galaxy-header .info .stats {
            display: flex;
            gap: 16px;
            margin-top: 10px;
            font-size: 0.85rem;
            color: #7788aa;
        }
        .galaxy-header .info .stats span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .knowledge-tree {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-left: 0;
        }

        .node-level-0 {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 14px;
            padding: 18px 24px;
            margin-bottom: 6px;
            transition: all 0.25s;
        }
        .node-level-0:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 255, 255, 0.12);
        }
        .node-level-0 .node-title {
            font-size: 1.15rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            user-select: none;
        }
        .node-level-0 .node-title .toggle {
            font-size: 0.85rem;
            color: #7788aa;
            transition: transform 0.3s;
            display: inline-block;
            width: 18px;
            text-align: center;
        }
        .node-level-0 .node-title .toggle.open {
            transform: rotate(90deg);
        }
        .node-level-0 .node-title .tag {
            font-size: 0.7rem;
            padding: 2px 12px;
            border-radius: 20px;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.08);
            color: #99aacd;
            margin-left: auto;
        }
        .node-level-0 .node-desc {
            color: #99aacd;
            font-size: 0.92rem;
            margin-top: 6px;
            line-height: 1.6;
            padding-left: 28px;
        }
        .node-level-0 .node-children {
            padding-left: 20px;
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            border-left: 2px solid rgba(255, 255, 255, 0.06);
        }
        .node-level-0 .node-children.collapsed {
            display: none;
        }

        .node-level-1 {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            padding: 12px 18px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: all 0.2s;
        }
        .node-level-1:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        .node-level-1 .node-title {
            font-size: 1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            user-select: none;
        }
        .node-level-1 .node-title .toggle {
            font-size: 0.8rem;
            color: #667799;
            transition: transform 0.3s;
            display: inline-block;
            width: 16px;
            text-align: center;
        }
        .node-level-1 .node-title .toggle.open {
            transform: rotate(90deg);
        }
        .node-level-1 .node-title .tag {
            font-size: 0.65rem;
            padding: 1px 10px;
            border-radius: 20px;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.06);
            color: #8899bb;
            margin-left: auto;
        }
        .node-level-1 .node-desc {
            color: #8899bb;
            font-size: 0.88rem;
            margin-top: 4px;
            line-height: 1.5;
            padding-left: 24px;
        }
        .node-level-1 .node-children {
            padding-left: 16px;
            margin-top: 8px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            border-left: 2px solid rgba(255, 255, 255, 0.04);
        }
        .node-level-1 .node-children.collapsed {
            display: none;
        }

        .node-level-2 {
            padding: 8px 14px 8px 20px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.03);
            display: flex;
            align-items: flex-start;
            gap: 8px;
            transition: all 0.2s;
        }
        .node-level-2:hover {
            background: rgba(255, 255, 255, 0.04);
        }
        .node-level-2 .bullet {
            color: #667799;
            font-size: 0.8rem;
            margin-top: 2px;
            flex-shrink: 0;
        }
        .node-level-2 .text {
            flex: 1;
        }
        .node-level-2 .text .label {
            font-weight: 500;
            font-size: 0.9rem;
        }
        .node-level-2 .text .explain {
            color: #7788aa;
            font-size: 0.82rem;
            margin-top: 1px;
        }
        .node-level-2 .tag-sm {
            font-size: 0.6rem;
            padding: 1px 8px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.06);
            color: #8899bb;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .footer-map {
            margin-top: 60px;
            padding: 30px;
            border-radius: 16px;
            background: rgba(20, 26, 46, 0.5);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .footer-map h3 {
            text-align: center;
            font-size: 1.3rem;
            font-weight: 600;
            color: #aabbdd;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }
        .footer-map .map-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 12px;
        }
        .footer-map .map-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: all 0.25s;
            cursor: pointer;
        }
        .footer-map .map-item:hover {
            background: rgba(255, 255, 255, 0.06);
            transform: translateX(4px);
        }
        .footer-map .map-item .mi-icon {
            font-size: 1.5rem;
            flex-shrink: 0;
        }
        .footer-map .map-item .mi-text {
            flex: 1;
        }
        .footer-map .map-item .mi-text .mi-name {
            font-weight: 600;
            font-size: 0.95rem;
        }
        .footer-map .map-item .mi-text .mi-desc {
            color: #7788aa;
            font-size: 0.8rem;
        }
        .footer-map .map-item .mi-arrow {
            color: #445577;
            font-size: 1.1rem;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }
            .header .subtitle {
                font-size: 0.9rem;
            }
            .galaxy-tab {
                padding: 8px 14px;
                font-size: 0.8rem;
                gap: 4px;
            }
            .galaxy-tab .icon {
                font-size: 1rem;
            }
            .galaxy-tab .badge {
                display: none;
            }
            .galaxy-header {
                flex-direction: column;
                text-align: center;
                padding: 18px 16px;
            }
            .galaxy-header .big-icon {
                font-size: 2rem;
            }
            .galaxy-header .info h2 {
                font-size: 1.3rem;
            }
            .node-level-0 {
                padding: 14px 16px;
            }
            .node-level-0 .node-title {
                font-size: 1rem;
                flex-wrap: wrap;
            }
            .node-level-0 .node-title .tag {
                margin-left: 0;
                font-size: 0.65rem;
            }
            .node-level-1 {
                padding: 10px 12px;
            }
            .node-level-1 .node-title {
                font-size: 0.9rem;
                flex-wrap: wrap;
            }
            .node-level-2 {
                padding: 6px 10px 6px 14px;
                flex-wrap: wrap;
            }
            .node-level-2 .text .label {
                font-size: 0.85rem;
            }
            .footer-map .map-grid {
                grid-template-columns: 1fr;
            }
            .container {
                padding: 12px 10px 30px;
            }
            .galaxy-tabs {
                gap: 6px;
            }
        }
        @media (max-width: 480px) {
            .header h1 {
                font-size: 1.5rem;
            }
            .galaxy-tab {
                padding: 6px 10px;
                font-size: 0.7rem;
            }
            .galaxy-tab .icon {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>

    <div class="stars" id="stars"></div>

    <div class="shooting-star" style="top:10%;left:80%;animation-delay:0s;"></div>
    <div class="shooting-star" style="top:30%;left:60%;animation-delay:2.5s;"></div>
    <div class="shooting-star" style="top:60%;left:90%;animation-delay:5.2s;"></div>

    <div class="container" id="app">

        <div class="header">
            <h1>🌌 知识宇宙</h1>
            <p class="subtitle">从 Clash 到 AI · 七大星系全景知识图谱</p>
            <div class="divider"></div>
        </div>

        <div class="galaxy-tabs" id="galaxyTabs"></div>

        <div class="content-area" id="contentArea">
            <div style="text-align:center;padding:60px 20px;color:#667799;">
                <div style="font-size:3rem;margin-bottom:16px;">⏳</div>
                <div>正在加载知识宇宙…</div>
            </div>
        </div>

        <div class="footer-map" id="footerMap">
            <h3>🗺️ 知识宇宙全景图</h3>
            <div class="map-grid" id="mapGrid"></div>
        </div>

    </div>

    <script>
        // ============================================================
        //  🛡️ 先用一个try-catch包住整个逻辑，防止白屏
        // ============================================================
        try {

            // ============================================================
            //  数据：七大星系
            //  💡 所有字符串用反引号 ` 避免单引号嵌套问题
            // ============================================================
            const GALAXIES = [{
                id: 0,
                name: `网络代理`,
                icon: `🔌`,
                color: `#ff6b6b`,
                desc: `Clash Verge、代理协议、机场、规则模式`,
                count: 12,
                headerDesc: `从 Clash Verge 客户端出发，辐射到代理协议、机场服务、规则配置等完整生态。`,
                trees: [{
                    title: `🔌 Clash Verge（客户端）`,
                    tag: `工具`,
                    desc: `Clash 的图形界面客户端，支持多平台。你下载后点开关、选节点，底层调用 Clash 核心引擎。`,
                    children: [{
                        title: `Clash 核心引擎`,
                        tag: `引擎`,
                        desc: `开源代理工具，Verge 只是外壳。核心负责：解析配置→建立连接→转发流量→执行规则。`,
                        children: [
                            { label: `配置文件格式`, explain: `YAML 格式，包含代理节点、规则组、策略组` },
                            { label: `核心版本`, explain: `Clash Meta（原 Clash Premium）是目前最活跃的分支` },
                            { label: `API 控制`, explain: `Clash 提供 RESTful API，可被其他程序控制` }
                        ]
                    }, {
                        title: `代理协议`,
                        tag: `协议`,
                        desc: `代理客户端和服务器之间的通信语言，不同协议有不同伪装和加密方式。`,
                        children: [
                            { label: `V2Ray / VMess`, explain: `最主流，支持 WebSocket/gRPC/TCP 多种传输方式` },
                            { label: `Shadowsocks (SS)`, explain: `早期主流，简单轻量，但现在容易被识别` },
                            { label: `Trojan`, explain: `伪装成 HTTPS 流量，更难被墙识别` },
                            { label: `Hysteria2`, explain: `基于 QUIC 协议，速度快但特征明显` },
                            { label: `WireGuard`, explain: `VPN 协议，速度极快但容易被封 IP` }
                        ]
                    }, {
                        title: `机场（代理服务商）`,
                        tag: `服务`,
                        desc: `提供代理节点的服务商。你付费买流量，他们给订阅链接。`,
                        children: [
                            { label: `节点质量`, explain: `看延迟（低）、丢包率（低）、带宽（高）` },
                            { label: `流量计费`, explain: `按 GB/TB 计费，有按量和包月两种` },
                            { label: `解锁能力`, explain: `能否看 Netflix/Disney+/YouTube Premium` },
                            { label: `审计规则`, explain: `是否禁止 BT 下载或成人内容` }
                        ]
                    }, {
                        title: `规则模式（Rule）`,
                        tag: `配置`,
                        desc: `决定哪些流量走代理、哪些直连。Clash 最强大的功能。`,
                        children: [
                            { label: `全局（Global）`, explain: `所有流量全部走代理` },
                            { label: `规则（Rule）`, explain: `国内直连 + 国外走代理（最推荐）` },
                            { label: `直连（Direct）`, explain: `全部不走代理` },
                            { label: `脚本模式`, explain: `用 JavaScript 自定义分流逻辑` }
                        ]
                    }, {
                        title: `订阅链接`,
                        tag: `概念`,
                        desc: `机场给你的 URL。Clash 定期访问它获取最新节点列表。到期后链接失效。`,
                        children: [
                            { label: `自动更新`, explain: `Clash 可设置每 24 小时自动拉取最新订阅` },
                            { label: `转换/托管`, explain: `用 subconverter 转换格式或合并多个订阅` }
                        ]
                    }, {
                        title: `代理 vs VPN`,
                        tag: `对比`,
                        desc: `两者本质不同，不是一回事。`,
                        children: [
                            { label: `VPN`, explain: `系统级加密隧道，所有流量走虚拟网卡，全局生效` },
                            { label: `代理`, explain: `应用级转发，只代理特定应用或端口的流量` },
                            { label: `Clash 本质`, explain: `Clash 是代理工具，不是 VPN（但支持 TUN 模式模拟 VPN）` }
                        ]
                    }]
                }, {
                    title: `🔄 进阶概念`,
                    tag: `延伸`,
                    desc: `理解这些，你就能诊断绝大多数代理问题了。`,
                    children: [{
                        title: `TUN 模式`,
                        tag: `进阶`,
                        desc: `Clash 创建虚拟网卡，捕获所有系统流量。让不支持代理的应用也能走代理。`,
                    }, {
                        title: `DNS 泄露`,
                        tag: `问题`,
                        desc: `配置不当导致真实 DNS 请求暴露给 ISP，即使流量走了代理。`,
                    }, {

                        { label: `Qdrant`, explain: `Rust 写的，性能好` },
                        { label: `Chroma`, explain: `轻量级，适合学习` }
                    ]
                }, {
                    title: `📝 SQL 基础`,
                    tag: `技能`,
                    desc: `不管用什么数据库，SQL 都是核心技能。`,
                    children: [
                        { label: `SELECT`, explain: `查询数据` },
                        { label: `INSERT`, explain: `插入数据` },
                        { label: `UPDATE`, explain: `更新数据` },
                        { label: `DELETE`, explain: `删除数据` },
                        { label: `JOIN`, explain: `关联多张表` },
                        { label: `CREATE TABLE`, explain: `建表` }
                    ]
                }, {
                    title: `🔗 ORM（对象关系映射）`,
                    tag: `工具`,
                    desc: `不用写 SQL，用代码操作数据库。`,
                    children: [
                        { label: `Python: SQLAlchemy`, explain: `Python 最强大的 ORM` },
                        { label: `JS: Prisma`, explain: `下一代 ORM，类型安全` },
                        { label: `JS: TypeORM`, explain: `TypeScript 最流行` },
                        { label: `Java: MyBatis`, explain: `半 ORM，SQL 和代码分离` }
                    ]
                }]
            }];

            // ============================================================
            //  渲染逻辑
            // ============================================================

            let currentGalaxy = 0;

            function createStars() {
                const container = document.getElementById(`stars`);
                if (!container) return;
                const count = 180;
                for (let i = 0; i < count; i++) {
                    const star = document.createElement(`div`);
                    star.className = `star`;
                    const size = Math.random() * 2.5 + 1;
                    star.style.width = size + `px`;
                    star.style.height = size + `px`;
                    star.style.left = Math.random() * 100 + `%`;
                    star.style.top = Math.random() * 100 + `%`;
                    star.style.setProperty(`--duration`, (Math.random() * 3 + 2) + `s`);
                    star.style.animationDelay = Math.random() * 5 + `s`;
                    star.style.opacity = Math.random() * 0.5 + 0.2;
                    container.appendChild(star);
                }
            }

            function renderTabs() {
                const container = document.getElementById(`galaxyTabs`);
                if (!container) return;
                container.innerHTML = ``;
                GALAXIES.forEach((g, idx) => {
                    const tab = document.createElement(`div`);
                    tab.className = `galaxy-tab tab-${idx}${idx === currentGalaxy ? ` active` : ``}`;
                    tab.innerHTML = `
                        <span class="icon">${g.icon}</span>
                        <span>${g.name}</span>
                        <span class="badge">${g.count}</span>
                    `;
                    tab.dataset.idx = idx;
                    tab.addEventListener(`click`, () => switchGalaxy(idx));
                    container.appendChild(tab);
                });
            }

            function switchGalaxy(idx) {
                if (idx === currentGalaxy) return;
                currentGalaxy = idx;
                document.querySelectorAll(`.galaxy-tab`).forEach((tab, i) => {
                    tab.classList.toggle(`active`, i === idx);
                });
                renderContent(idx);
            }

            function renderContent(idx) {
                const area = document.getElementById(`contentArea`);
                if (!area) return;
                const g = GALAXIES[idx];

                let treeHTML = ``;
                g.trees.forEach((node, ti) => {
                    treeHTML += buildNodeHTML(node, 0, ti);
                });

                area.innerHTML = `
                    <div class="galaxy-content active">
                        <div class="galaxy-header" style="border-left: 4px solid ${g.color};">
                            <div class="big-icon">${g.icon}</div>
                            <div class="info">
                                <h2 style="color:${g.color};">${g.name}</h2>
                                <div class="desc">${g.headerDesc}</div>
                                <div class="stats">
                                    <span>📚 ${g.count} 个核心概念</span>
                                    <span>📊 ${g.trees.length} 个知识分支</span>
                                </div>
                            </div>
                        </div>
                        <div class="knowledge-tree">
                            ${treeHTML}
                        </div>
                    </div>
                `;

                // 绑定展开折叠
                area.querySelectorAll(`.node-title[data-toggle]`).forEach(el => {
                    el.addEventListener(`click`, function(e) {
                        e.stopPropagation();
                        const parent = this.closest(`[data-has-children]`);
                        if (!parent) return;
                        const children = parent.querySelector(`:scope > .node-children`);
                        const toggle = this.querySelector(`.toggle`);
                        if (children) {
                            children.classList.toggle(`collapsed`);
                            if (toggle) toggle.classList.toggle(`open`);
                        }
                    });
                });
            }

            function buildNodeHTML(node, level, index) {
                const hasChildren = node.children && node.children.length > 0;
                let html = ``;

                if (level === 0) {
                    html = `
                        <div class="node-level-0" data-has-children="${hasChildren}">
                            <div class="node-title" data-toggle="true">
                                ${hasChildren ? `<span class="toggle open">▶</span>` : `<span style="width:18px;display:inline-block;"></span>`}
                                <span>${node.title || ``}</span>
                                ${node.tag ? `<span class="tag" style="border:1px solid ${GALAXIES[currentGalaxy].color}40;color:${GALAXIES[currentGalaxy].color};">${node.tag}</span>` : ``}
                            </div>
                            ${node.desc ? `<div class="node-desc">${node.desc}</div>` : ``}
                            ${hasChildren ? buildChildrenHTML(node.children, 1) : ``}
                        </div>
                    `;
                } else if (level === 1) {
                    html = `
                        <div class="node-level-1" data-has-children="${hasChildren}">
                            <div class="node-title" data-toggle="true">
                                ${hasChildren ? `<span class="toggle open">▶</span>` : `<span style="width:16px;display:inline-block;"></span>`}
                                <span>${node.title || ``}</span>
                                ${node.tag ? `<span class="tag" style="color:${GALAXIES[currentGalaxy].color};">${node.tag}</span>` : ``}
                            </div>
                            ${node.desc ? `<div class="node-desc">${node.desc}</div>` : ``}
                            ${hasChildren ? buildChildrenHTML(node.children, 2) : ``}
                        </div>
                    `;
                }

                return html;
            }

            function buildChildrenHTML(children, level) {
                let html = `<div class="node-children">`;
                children.forEach(child => {
                    if (level === 1) {
                        html += buildNodeHTML(child, 1, Math.random());
                    } else {
                        const label = child.label || child.title || ``;
                        const explain = child.explain || child.desc || ``;
                        html += `
                            <div class="node-level-2">
                                <span class="bullet">▸</span>
                                <div class="text">
                                    <div class="label">${label}</div>
                                    ${explain ? `<div class="explain">${explain}</div>` : ``}
                                </div>
                                ${child.tag ? `<span class="tag-sm">${child.tag}</span>` : ``}
                            </div>
                        `;
                    }
                });
                html += `</div>`;
                return html;
            }

            function renderMap() {
                const grid = document.getElementById(`mapGrid`);
                if (!grid) return;
                grid.innerHTML = ``;
                GALAXIES.forEach((g, idx) => {
                    const item = document.createElement(`div`);
                    item.className = `map-item`;
                    item.innerHTML = `
                        <span class="mi-icon">${g.icon}</span>
                        <div class="mi-text">
                            <div class="mi-name" style="color:${g.color};">${g.name}</div>
                            <div class="mi-desc">${g.desc}</div>
                        </div>
                        <span class="mi-arrow">→</span>
                    `;
                    item.addEventListener(`click`, () => {
                        switchGalaxy(idx);
                        document.querySelector(`.galaxy-tabs`).scrollIntoView({ behavior: `smooth`,
                            block: `start` });
                    });
                    grid.appendChild(item);
                });
            }

            // ============================================================
            //  启动
            // ============================================================

            createStars();
            renderTabs();
            renderContent(0);
            renderMap();

            console.log(`🌌 知识宇宙已加载！七大星系等待探索。`);
            console.log(`💡 点击标签切换星系，点击知识节点展开/折叠。`);

        } catch (e) {
            // 如果出错了，在页面上显示错误信息，而不是白屏
            console.error(`❌ 知识宇宙加载失败:`, e);
            document.getElementById(`contentArea`).innerHTML = `
                <div style="text-align:center;padding:60px 20px;color:#ff6b6b;">
                    <div style="font-size:3rem;margin-bottom:16px;">⚠️</div>
                    <h2 style="margin-bottom:12px;color:#ff6b6b;">加载失败</h2>
                    <p style="color:#99aacd;margin-bottom:8px;">JavaScript 执行出错，请检查控制台（F12）查看详细错误。</p>
                    <p style="color:#7788aa;font-size:0.85rem;">错误信息：${e.message}</p>
                </div>
            `;
        }
    </script>

</body>
</html>
